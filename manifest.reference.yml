# ws manifest reference
# https://github.com/dtuit/ws
#
# This file documents every option. Copy and trim to create your own manifest.yml.

# ---------------------------------------------------------------------------
# remotes
# ---------------------------------------------------------------------------
# Named URL prefixes for git clone. Clone URLs are constructed by appending
# "/<repo-name>.git" to each prefix.
#
# The "origin" key is the clone source and must resolve for every repo
# (either from a top-level prefix here or a per-repo full URL in repos.<name>.remotes.origin).
#
# Additional entries at this level (e.g. "upstream") are propagated to every
# repo as extra git remotes, unless the per-repo block overrides them. They
# use the same prefix-plus-name construction, so list them here only when
# the upstream and local repo names coincide; otherwise set the full URL on
# the specific repo.
#
# Allowed schemes: git@ (SSH shorthand), https://, ssh://, git://, http://
# Rejected: ext::, file://, ftp://, or anything starting with --

remotes:
  origin: git@github.com:acme-corp

# ---------------------------------------------------------------------------
# branch
# ---------------------------------------------------------------------------
# Default branch for all repos. Individual repos can override this.
# Default: master

branch: main

# ---------------------------------------------------------------------------
# root
# ---------------------------------------------------------------------------
# Required. Directory where repos are cloned, relative to this file (or absolute).
#
# Examples:
#   root: ..              # recommended sibling layout
#   root: repos           # repos inside workspace directory
#   root: /opt/code       # absolute path
#
# Recommendation:
#   Prefer root: .. to keep the workspace repo separate from the managed repos.
#   Use root: repos when you want a self-contained workspace directory.

root: ..

# ---------------------------------------------------------------------------
# workspace
# ---------------------------------------------------------------------------
# Filename for the generated VS Code workspace file (created by ws context).
# Placed in the same directory as this manifest.
# Default: ws.code-workspace

workspace: ws.code-workspace

# ---------------------------------------------------------------------------
# workspaces
# ---------------------------------------------------------------------------
# Optional named workspace presets.
#
# Each entry maps a workspace name to the filter it should use.
#
# Example:
#   workspaces:
#     backend: backend,active:14d
#     frontend: web-app,admin-dashboard
#
# Run `ws workspace use <name>` to activate one in the current shell.
# With `ws shell init` loaded, that command updates `WS_WORKSPACE` so
# `ws ll`, `ws open`, and fan-out commands default to that workspace.

workspaces:
  backend: backend
  frontend: web-app,admin-dashboard

# ---------------------------------------------------------------------------
# scopes
# ---------------------------------------------------------------------------
# Legacy symlink-scope configuration from older ws versions.
#
# New agent integrations should prefer the `.ws/scope.yml` hint written by
# `ws context`, or `.ws/workspaces/<name>/scope.yml` for named workspaces.
# This block is still parsed so ws can clean up old symlink trees safely.
#
# Recommendation:
#   Omit this block for new workspaces unless you need migration compatibility.

scopes:
  - dir: .scope
    source: context

# ---------------------------------------------------------------------------
# worktrees
# ---------------------------------------------------------------------------
# Default worktree mode for supported commands.
# Default: false
#
# When true, these commands include linked git worktrees by default:
#   ws repos
#   ws ll
#   ws pull
#   ws context
#   ws <command...>
#
# Use local CLI overrides when needed:
#   ws -t ll backend
#   ws --no-worktrees context backend
#
# Recommendation:
#   Put personal preference here in manifest.local.yml, not shared manifest.yml.

worktrees: false

# ---------------------------------------------------------------------------
# worktree_root
# ---------------------------------------------------------------------------
# Directory where `ws worktree add` creates worktrees.
# Relative to the workspace directory, or absolute.
# Default: .worktrees
#
# Layout: <worktree_root>/<repo-name>/<branch>
# Example: .worktrees/api/feature-a
#
# Worktrees are addressed as repo@branch (e.g., api@feature-a).

worktree_root: .worktrees

# ---------------------------------------------------------------------------
# mux
# ---------------------------------------------------------------------------
# Terminal multiplexer (tmux/zellij) session configuration.
# Used by `ws mux` to create a persistent session with the configured layout.
#
# backend: "tmux", "zellij", or omit to auto-detect (prefers zellij).
# session: session name override (default: workspace directory base name).
# bars:    show status/help bars. For zellij: tab-bar and status-bar plugins.
#          For tmux: the status line. Default: false.
# windows: list of window/tab definitions.
#
# Each window entry supports:
#   name:   tab/window name (required)
#   dir:    repo name or relative path (single pane directory)
#   filter: ws filter string (group, repo list, etc.)
#   split:  true to create one pane per matched repo (with filter)
#   panes:  number of panes (for dir-based windows; default 1)
#   cmd:    command to run in panes — string applies to all, list is positional
#           e.g. cmd: make          (all panes)
#           e.g. cmd: [make, ""]    (first pane only)
#   layout: pane arrangement: "tiled" (default), "even-horizontal", "even-vertical"
#   sizes:  pane sizes as percentages (must match pane count; omit for equal)
#
# For a single session, use windows: directly (legacy format):
#
#   mux:
#     backend: tmux
#     windows:
#       - {name: code, dir: api-server}
#
# For multiple named sessions, use sessions: (ws mux <name> to pick one):
#
# Save the current session layout to the manifest with:
#   ws mux save [session]              # writes to manifest.yml
#   ws mux save [--local] [session]    # writes to manifest.local.yml

mux:
  backend: tmux
  bars: true
  sessions:
    dev:
      windows:
        - {name: backend, filter: backend, split: true, layout: tiled}
        - {name: frontend, filter: frontend, split: true}
        - {name: shell, dir: api-server, panes: 2, sizes: [70, 30], layout: even-horizontal}
    ops:
      windows:
        - {name: infra, filter: infra, split: true}
        - {name: logs, dir: deploy-configs}

# ---------------------------------------------------------------------------
# groups
# ---------------------------------------------------------------------------
# Named sets of repos. Used for filtering across all commands:
#   ws ll backend          show dashboard for backend repos
#   ws context backend     scope all commands to backend
#   ws open                open the current generated VS Code workspace
#   ws fetch backend       fetch only backend repos
#   ws backend git status  run git status in backend repos
#
# A repo can appear in multiple groups.
# "all" is a reserved filter that returns every active repo in the merged manifest.

groups:
  backend:  [api-server, auth-service, worker]
  frontend: [web-app, admin-dashboard]
  infra:    [deploy-configs, shared-protos]

# ---------------------------------------------------------------------------
# repos
# ---------------------------------------------------------------------------
# Active repos. Each entry is cloned by ws setup and visible to all commands.
#
# Bare entries use the top-level origin prefix and default branch:
#   api-server:
#
# Override branch:
#   auth-service: { branch: develop }
#
# Add extra git remotes (e.g. an upstream fork). Values are full URLs, merged
# over the top-level remotes map. Per-repo keys override top-level keys.
#   upstream-lib:
#     branch: stable
#     remotes:
#       upstream: git@github.com:open-source-org/upstream-lib.git
#     default_compare: upstream
#
# default_compare can pin a specific upstream branch when the local branch
# name doesn't exist on the remote (e.g. a renamed fork branch):
#   bifrost:
#     branch: xtracta-main
#     remotes:
#       upstream: git@github.com:maximhq/bifrost.git
#     default_compare: upstream:main      # or just `upstream` to use upstream/HEAD
#
# Override the origin URL entirely (replaces the prefix-based default):
#   custom-tool:
#     remotes:
#       origin: git@custom.host:org/repo.git
#
# Override the clone root for one repo:
#   legacy-vendor: { root: vendor }
#
# Repo names must be simple directory names (no /, \, or ..).
# Repos listed here are always active, even if they also appear in exclude:.

repos:
  # Backend
  api-server:
  auth-service: { branch: develop }
  worker:

  # Frontend
  web-app:
  admin-dashboard:

  # Infrastructure
  deploy-configs:
  shared-protos:

  # Forked OSS repo: origin from the top-level prefix, upstream added literally.
  upstream-lib:
    branch: stable
    remotes:
      upstream: git@github.com:open-source-org/upstream-lib.git
    default_compare: upstream

  # Bespoke origin URL that doesn't fit the prefix convention.
  custom-tool:
    remotes:
      origin: git@custom.host:org/repo.git

# ---------------------------------------------------------------------------
# exclude
# ---------------------------------------------------------------------------
# Repos listed here are never cloned or shown in commands.
# This is useful for maintaining a complete catalog of all repos in an org
# while marking inactive/legacy ones.
#
# A repo in both repos: and exclude: is treated as active (repos wins).
# Inline comments are useful for recording why a repo was excluded.

exclude:
  - legacy-api          # replaced by api-server
  - old-frontend        # replaced by web-app
  - intern-project-2024 # one-off

# ---------------------------------------------------------------------------
# Local overrides (manifest.local.yml)
# ---------------------------------------------------------------------------
# Create manifest.local.yml alongside this file for personal customization.
# It is merged on top of this manifest and should be gitignored.
#
# Merge rules:
#   remotes:        union (local wins on name conflict)
#   repos:          union (local wins on name conflict, un-excludes repos)
#   repos.*.remotes: key-by-key merge within a repo (local adds + local overrides)
#   exclude:        union (additive)
#   groups:         local replaces same-name groups, new groups added
#   root:           local overrides if set
#   workspace:      local overrides if set
#   workspaces:     local replaces same-name presets, new presets added
#   scopes:         local replaces the full list if set
#   worktrees:      local overrides if set
#
# Example manifest.local.yml:
#
#   workspaces:
#     backend: backend,active:7d
#     frontend: web-app,admin-dashboard
#
#   worktrees: true
#
#   repos:
#     legacy-api:                              # un-exclude for local work
#     my-experiment:
#       branch: dev
#       remotes:
#         origin: git@github.com:myuser/my-experiment.git
#
#   exclude:
#     - worker                                 # I don't need this locally
#
#   groups:
#     my-project: [api-server, my-experiment]
#
# You can also snapshot the current context into a group with:
#   ws context save backend-focus
#   ws context save --local my-scratch-scope
